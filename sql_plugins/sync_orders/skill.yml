name: sync_orders
description: "orders CDC sync to order_sync"

on:
  - orders

sinks:
  insert:
    - name: sync
      sql: |
        SELECT 
          @cdc_lsn as cdc_lsn,
          @cdc_tx_id as cdc_transaction_id,
          @cdc_table as cdc_source_table,
          @cdc_operation as cdc_operation,
          o.order_id,
          o.amount,
          o.status,
          o.created_at
        FROM orders o
        WHERE o.order_id IN (@order_ids);
      output: order_sync_db
      primary_key: order_id

  update:
    - name: sync
      sql: |
        SELECT 
          @cdc_lsn as cdc_lsn,
          @cdc_tx_id as cdc_transaction_id,
          @cdc_table as cdc_source_table,
          @cdc_operation as cdc_operation,
          o.order_id,
          o.amount,
          o.status,
          o.created_at
        FROM orders o
        WHERE o.order_id IN (@order_ids);
      output: order_sync_db
      primary_key: order_id

  delete:
    - name: sync
      sql: |
        SELECT @cdc_lsn as cdc_lsn, @order_id as order_id
      output: order_sync_db
      primary_key: order_id
