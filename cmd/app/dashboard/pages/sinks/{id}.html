<!--layout:dashboard-->
{{define "content"}}
<div class="max-w-7xl mx-auto">
    <!-- Page Header -->
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-2">
            <button onclick="window.location.href='/sinks'" 
                    class="p-2 hover:bg-surface rounded-lg transition-colors"
                    aria-label="Back to sinks">
                <svg class="w-5 h-5 text-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <h2 class="text-2xl sm:text-3xl font-bold text-text">Sink: <span id="sink-name-display" class="text-primary">Loading...</span></h2>
        </div>
        <p class="text-sm text-textMuted">Execute SQL queries against this sink database</p>
        <div class="mt-3">
            <button onclick="runMigration()" 
                    class="flex items-center justify-center gap-2 px-4 py-2 bg-warning hover:bg-warningHover text-white font-medium rounded-lg transition-all duration-200 shadow-md">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                <span>Migrate</span>
            </button>
        </div>
    </div>

    <!-- Query Section -->
    <div class="bg-surface rounded-xl shadow-lg border border-border overflow-hidden mb-6">
        <!-- Query Input -->
        <div class="p-4 sm:p-6 border-b border-border">
            <label class="block text-sm font-medium text-text mb-2">SQL Query</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <textarea id="query-input" 
                          rows="4" 
                          class="flex-1 w-full px-4 py-3 bg-surfaceHover border border-border rounded-lg text-text font-mono text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none"
                          placeholder="SELECT * FROM your_table LIMIT 100"></textarea>
            </div>
            <div class="mt-3 flex items-center gap-3">
                <button onclick="executeQuery()" 
                        class="flex items-center justify-center gap-2 px-6 py-2.5 bg-primary hover:bg-primaryHover text-white font-medium rounded-lg transition-all duration-200 shadow-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>Execute</span>
                </button>
                <button onclick="loadTables()" 
                        class="flex items-center justify-center gap-2 px-4 py-2.5 bg-surfaceHover hover:bg-border text-text font-medium rounded-lg transition-all duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                    </svg>
                    <span>Load Tables</span>
                </button>
            </div>
        </div>

        <!-- Tables Quick Select -->
        <div id="tables-section" class="hidden p-4 sm:p-6 border-b border-border bg-surfaceHover/30">
            <label class="block text-sm font-medium text-text mb-2">Available Tables</label>
            <div id="tables-list" class="flex flex-wrap gap-2">
                <!-- Tables will be populated here -->
            </div>
        </div>
    </div>

    <!-- Results Section -->
    <div class="bg-surface rounded-xl shadow-lg border border-border overflow-hidden">
        <!-- Results Header -->
        <div class="p-4 sm:p-6 border-b border-border flex items-center justify-between">
            <h3 class="text-base sm:text-xl font-semibold text-text">Query Results</h3>
            <span id="results-count" class="text-sm text-textMuted"></span>
        </div>

        <!-- Results Container -->
        <div id="results-container" class="p-0">
            <div class="p-8 text-center text-textMuted">
                <svg class="mx-auto h-12 w-12 text-textMuted/50 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p>Execute a query to see results</p>
            </div>
        </div>
    </div>

    <!-- Migration Status -->
    <div id="migration-status" class="hidden mb-6 p-4 rounded-xl border flex items-center gap-3" role="status" aria-live="polite"></div>

    <!-- Error Message -->
    <div id="error-message" class="hidden mb-6 p-4 rounded-xl border border-error/30 bg-error/10 text-error" role="alert" aria-live="polite"></div>
</div>

<script>
const sinkId = window.location.pathname.split('/').pop(); // Extract ID from URL
let sinkName = sinkId;

// Update display name from API
fetch('/api/sinks/list')
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            const sink = data.sinks.find(s => s.id === sinkId);
            if (sink) {
                sinkName = sink.name;
                document.getElementById('sink-name-display').textContent = sinkName;
            }
        }
    });
let availableTables = [];

// Load tables on page load
document.addEventListener('DOMContentLoaded', loadTables);

async function loadTables() {
    try {
        const response = await fetch(`/api/sinks/${encodeURIComponent(sinkId)}/tables`);
        const data = await response.json();
        
        if (data.success) {
            availableTables = data.tables;
            renderTables(data.tables);
        } else {
            showError('Failed to load tables: ' + data.error);
        }
    } catch (err) {
        showError('Error loading tables: ' + err.message);
    }
}

function renderTables(tables) {
    const section = document.getElementById('tables-section');
    const list = document.getElementById('tables-list');
    
    if (tables.length === 0) {
        section.classList.add('hidden');
        return;
    }
    
    section.classList.remove('hidden');
    list.innerHTML = tables.map(table => `
        <button onclick="insertTableQuery('${escapeJs(table)}')" 
                class="px-3 py-1.5 bg-surfaceHover hover:bg-primary hover:text-white text-text text-sm font-medium rounded-lg transition-all duration-200 border border-border">
            ${escapeHtml(table)}
        </button>
    `).join('');
}

function insertTableQuery(tableName) {
    const queryInput = document.getElementById('query-input');
    queryInput.value = `SELECT * FROM "${tableName}" LIMIT 100`;
}

async function executeQuery() {
    const queryInput = document.getElementById('query-input');
    const query = queryInput.value.trim();
    
    if (!query) {
        showError('Please enter a SQL query');
        return;
    }
    
    // Clear previous error
    hideError();
    
    // Show loading state
    const resultsContainer = document.getElementById('results-container');
    resultsContainer.innerHTML = `
        <div class="p-8 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto mb-4"></div>
            <p class="text-textMuted">Executing query...</p>
        </div>
    `;
    
    try {
        const response = await fetch(`/api/sinks/${encodeURIComponent(sinkId)}/query`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ query: query }),
        });
        
        const data = await response.json();
        
        if (data.success) {
            renderResults(data.columns, data.rows, data.count);
        } else {
            showError('Query failed: ' + data.error);
            resultsContainer.innerHTML = `
                <div class="p-8 text-center text-textMuted">
                    <svg class="mx-auto h-12 w-12 text-textMuted/50 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <p>Query failed</p>
                </div>
            `;
        }
    } catch (err) {
        showError('Error executing query: ' + err.message);
        resultsContainer.innerHTML = `
            <div class="p-8 text-center text-textMuted">
                <svg class="mx-auto h-12 w-12 text-textMuted/50 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p>Query failed</p>
            </div>
        `;
    }
}

function renderResults(columns, rows, count) {
    const resultsContainer = document.getElementById('results-container');
    const resultsCount = document.getElementById('results-count');
    
    resultsCount.textContent = `${count} row${count !== 1 ? 's' : ''}`;
    
    if (rows.length === 0) {
        resultsContainer.innerHTML = `
            <div class="p-8 text-center text-textMuted">
                <svg class="mx-auto h-12 w-12 text-textMuted/50 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p>No results returned</p>
            </div>
        `;
        return;
    }
    
    // Create responsive table
    let html = '<div class="overflow-x-auto">';
    html += '<table class="w-full">';
    html += '<thead class="bg-surfaceHover">';
    html += '<tr>';
    columns.forEach(col => {
        html += `<th class="px-4 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider whitespace-nowrap">${escapeHtml(col)}</th>`;
    });
    html += '</tr>';
    html += '</thead>';
    html += '<tbody class="divide-y divide-border">';
    
    rows.forEach(row => {
        html += '<tr class="hover:bg-surfaceHover/50 transition-colors">';
        columns.forEach(col => {
            const value = row[col];
            const displayValue = value === null ? '<span class="text-textMuted italic">NULL</span>' : escapeHtml(String(value));
            html += `<td class="px-4 py-3 text-sm text-text whitespace-nowrap">${displayValue}</td>`;
        });
        html += '</tr>';
    });
    
    html += '</tbody>';
    html += '</table>';
    html += '</div>';
    
    resultsContainer.innerHTML = html;
}

function showError(message) {
    const errorEl = document.getElementById('error-message');
    errorEl.innerHTML = `
        <div class="flex items-center gap-3">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>${escapeHtml(message)}</span>
        </div>
    `;
    errorEl.classList.remove('hidden');
}

function hideError() {
    const errorEl = document.getElementById('error-message');
    errorEl.classList.add('hidden');
}

async function runMigration() {
    if (!confirm('Run migration for this sink database?')) {
        return;
    }

    hideError();
    hideMigrationStatus();

    // Show loading state in migration status
    const statusEl = document.getElementById('migration-status');
    statusEl.className = 'mb-6 p-4 rounded-xl border border-primary/30 bg-primary/10 flex items-center gap-3';
    statusEl.innerHTML = `
        <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-primary"></div>
        <span class="text-text">Running migration...</span>
    `;
    statusEl.classList.remove('hidden');

    try {
        const response = await fetch(`/api/sinks/${encodeURIComponent(sinkId)}/migrate`, {
            method: 'POST',
        });

        const data = await response.json();

        if (data.success) {
            statusEl.className = 'mb-6 p-4 rounded-xl border border-success/30 bg-success/10 flex items-center gap-3';
            statusEl.innerHTML = `
                <svg class="w-5 h-5 text-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                <span class="text-text font-medium">Migration completed successfully</span>
            `;
        } else {
            statusEl.className = 'mb-6 p-4 rounded-xl border border-error/30 bg-error/10 flex items-center gap-3';
            statusEl.innerHTML = `
                <svg class="w-5 h-5 text-error flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-error">Migration failed: ${escapeHtml(data.error)}</span>
            `;
        }
    } catch (err) {
        statusEl.className = 'mb-6 p-4 rounded-xl border border-error/30 bg-error/10 flex items-center gap-3';
        statusEl.innerHTML = `
            <svg class="w-5 h-5 text-error flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="text-error">Error running migration: ${escapeHtml(err.message)}</span>
        `;
    }
}

function hideMigrationStatus() {
    const statusEl = document.getElementById('migration-status');
    statusEl.classList.add('hidden');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function escapeJs(text) {
    return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}
</script>
{{end}}
