# dbkrab configuration

# MSSQL connection settings
mssql:
  host: localhost
  port: 1433
  user: sa
  password: your_password
  database: your_database

# Tables to monitor (format: schema.table)
tables:
  - dbo.orders
  - dbo.order_items

# Polling interval
polling_interval: 500ms

# Offset storage configuration
# Supports JSON file or SQLite backend
offset:
  type: json          # json or sqlite
  json_path: ./data/offset.json
  sqlite_path: ./data/offset.db

# Plugin configuration (both disabled by default)
plugins:
  wasm:
    enabled: false
    path: ./skills/wasm
  sql:
    enabled: true
    path: ./skills/sql

# API server port for plugin management
# Endpoints:
#   GET  /api/plugins        - List plugins
#   POST /api/plugins        - Load plugin (body: {name, path, config})
#   GET  /api/plugins/{name} - Get plugin info
#   DELETE /api/plugins/{name} - Unload plugin
#   POST /api/plugins/{name}/reload - Reload plugin
#   GET  /health            - Health check
api_port: 9020

# Sink configuration (platform store - CDC tracking, offsets, DLQ)
sink:
  type: sqlite
  path: ./data/system/dbkrab.db

# Business sinks output configuration
sinks:
  base_path: ./data/sinks
  # Sink database configurations (maps database names to actual storage)
  databases:

# Transaction buffer for cross-table integrity and batch processing
transaction_buffer:
  enabled: false  # Set to true for multi-table transaction integrity
  max_wait_time: 30s  # Max time to wait for incomplete transactions
  max_transactions_per_batch: 1000  # Max transactions per batch before delivery
  max_batch_bytes: 10485760  # 10MB max batch size before delivery

# CDC gap protection (prevents data loss from CDC cleanup)
cdc_protection:
  enabled: true
  
  # How often to check for gaps
  check_interval: 1m
  
  # Warning thresholds (triggers alert, continues polling)
  warning_lag_bytes: 104857600      # 100MB
  warning_lag_duration: 1h
  
  # Critical thresholds (triggers alert, continues polling)
  critical_lag_bytes: 1073741824    # 1GB
  critical_lag_duration: 6h
  
  # Recovery strategy when data loss is detected
  # Options: manual (pause and wait), snapshot (auto full load), timestamp (time-based recovery)
  recovery:
    strategy: manual  # Recommended for production
  
  # Alert configuration
  alert:
    enabled: true
    # Generic webhook
    webhook_url: https://hooks.example.com/alert
    # Multiple channels
    channels:
      - type: feishu
        url: https://open.feishu.cn/open-apis/bot/v2/hook/xxx
      - type: webhook
        url: https://hooks.slack.com/services/xxx

# Graceful degradation for MSSQL disconnection
# When enabled, dbkrab will retry connection instead of exiting on MSSQL disconnection
graceful_degradation:
  enabled: true
  max_disconnect_duration: 30m  # Max time to wait before alerting
  reconnect_base_delay: 5s      # Initial delay between reconnection attempts
  reconnect_max_delay: 60s      # Maximum delay (exponential backoff caps at this)