# dbkrab configuration

# MSSQL connection settings
mssql:
  host: localhost
  port: 1433
  user: sa
  password: your_password
  database: your_database

# Tables to monitor (format: schema.table)
tables:
  - dbo.orders
  - dbo.order_items

# Polling interval
polling_interval: 500ms

# LSN offset storage
offset_file: ./data/offset.json

# Plugin directory (WASM files, hot-reload enabled)
# Leave empty to disable plugin watching
plugin: ./plugins

# API server port for plugin management
# Endpoints:
#   GET  /api/plugins        - List plugins
#   POST /api/plugins        - Load plugin (body: {name, path, config})
#   GET  /api/plugins/{name} - Get plugin info
#   DELETE /api/plugins/{name} - Unload plugin
#   POST /api/plugins/{name}/reload - Reload plugin
#   GET  /health            - Health check
api_port: 9020

# Sink configuration
sink:
  type: sqlite
  path: ./data/cdc.db

# CDC gap protection (prevents data loss from CDC cleanup)
cdc_protection:
  enabled: true
  
  # How often to check for gaps
  check_interval: 1m
  
  # Warning thresholds (triggers alert, continues polling)
  warning_lag_bytes: 104857600      # 100MB
  warning_lag_duration: 1h
  
  # Critical thresholds (triggers alert, continues polling)
  critical_lag_bytes: 1073741824    # 1GB
  critical_lag_duration: 6h
  
  # Recovery strategy when data loss is detected
  # Options: manual (pause and wait), snapshot (auto full load), timestamp (time-based recovery)
  recovery:
    strategy: manual  # Recommended for production
  
  # Alert configuration
  alert:
    enabled: true
    # Generic webhook
    webhook_url: https://hooks.example.com/alert
    # Multiple channels
    channels:
      - type: feishu
        url: https://open.feishu.cn/open-apis/bot/v2/hook/xxx
      - type: webhook
        url: https://hooks.slack.com/services/xxx