# =============================================================================
# dbkrab Configuration Reference
# =============================================================================
# Copy this file to config.yml and modify values as needed.
# All fields are optional - defaults will be applied when not specified.

# -----------------------------------------------------------------------------
# MSSQL Connection (required)
# -----------------------------------------------------------------------------
mssql:
  host: localhost          # MSSQL server address
  port: 1433               # MSSQL port
  user: sa                 # Username
  password: your_password  # Password
  database: your_database  # Database name
  # SQL Server timezone for CDC timestamp conversion
  # MSSQL datetime type has no timezone info, so we need to specify it
  # Supports IANA names (e.g., "Asia/Shanghai") or UTC offsets (e.g., "UTC+8")
  timezone: ""  # Empty = use local timezone

# -----------------------------------------------------------------------------
# CDC Monitored Tables
# -----------------------------------------------------------------------------
# Tables to monitor, format: schema.table
tables:
  - dbo.orders
  - dbo.order_items

# -----------------------------------------------------------------------------
# CDC Configuration
# -----------------------------------------------------------------------------
cdc:
  # Polling interval: CDC log poll frequency, default 500ms
  interval: 500ms

  # Offset storage: tracks consumption position per table
  offset:
    type: json             # Storage type: json | sqlite
    json_path: ./data/offset.json   # JSON file path
    sqlite_path: ./data/offset.db   # SQLite file path

  # Transaction buffer: cross-table transaction consistency & batch optimization
  transaction_buffer:
    enabled: false            # Enable transaction buffer
    max_wait_time: 30s        # Max wait time per transaction
    max_transactions_per_batch: 1000   # Max transactions per batch
    max_batch_bytes: 10485760  # 10MB, max batch size

  # Gap protection: prevents data loss from CDC cleanup
  gap:
    enabled: true             # Enable gap detection
    check_interval: 1m        # Check frequency
    warning_lag_bytes: 104857600        # 100MB, warning threshold
    warning_lag_duration: 1h            # 1h, warning threshold
    critical_lag_bytes: 1073741824      # 1GB, critical threshold
    critical_lag_duration: 6h          # 6h, critical threshold

    # Recovery strategy when data loss is detected
    recovery:
      strategy: manual         # manual | snapshot | timestamp

    # Alert configuration
    alert:
      enabled: true           # Enable alerts
      webhook_url: https://hooks.example.com/alert
      channels:
        - type: feishu
          url: https://open.feishu.cn/open-apis/bot/v2/hook/xxx
        - type: webhook
          url: https://hooks.slack.com/services/xxx

# -----------------------------------------------------------------------------
# API Server Port
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# App Storage (CDC transactions, DLQ, poller state)
# -----------------------------------------------------------------------------
app:
  listen: 9020        # HTTP API listen port
  host: localhost      # HTTP API bind address
  type: sqlite
  path: ./data/system/dbkrab.db

# -----------------------------------------------------------------------------
# Business Sinks (data output targets)
# -----------------------------------------------------------------------------
sinks:
  - name: business
    description: Primary business database
    type: sqlite
    path: ./data/sinks/business/business.db
    migrations: ./data/sinks/business/migrations
  - name: analytics
    description: Analytics database
    type: duckdb
    path: ./data/sinks/analytics.duckdb
    migrations: ./data/sinks/analytics/migrations

# -----------------------------------------------------------------------------
# MSSQL Disconnection Graceful Degradation
# -----------------------------------------------------------------------------
graceful_degradation:
  enabled: true
  max_disconnect_duration: 30m
  reconnect_base_delay: 5s
  reconnect_max_delay: 60s

# -----------------------------------------------------------------------------
# Plugin Configuration
# -----------------------------------------------------------------------------
plugins:
  sql:
    enabled: true
    path: ./skills/sql

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
logging:
  level: info
  console:
    enabled: true
  file:
    enabled: true
    path: ./logs/dbkrab.log
    max_size_mb: 100
    max_age_days: 7
    max_files: 4
    compress: true