<!--layout:dashboard-->
{{ define "content" }}
<div class="space-y-6">
    <h2 class="text-2xl font-bold text-gray-800">Overview</h2>
    
    <!-- Health Status - loaded via HTMX -->
    <div class="bg-white rounded-lg shadow p-6" hx-get="/api/health" hx-trigger="load">
        <div class="flex items-center gap-3">
            <span class="text-4xl">✅</span>
            <div>
                <h3 class="text-xl font-semibold text-green-600">System Healthy</h3>
                <p class="text-gray-600">All services are running normally</p>
            </div>
        </div>
    </div>

    <!-- Stats Cards - loaded via HTMX -->
    <div hx-get="/api/dlq/stats" hx-trigger="load" hx-ext="json-enc">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-500 text-sm mb-1">DLQ Pending</p>
                <p class="text-4xl font-bold text-green-600" id="pending-count">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-500 text-sm mb-1">DLQ Resolved</p>
                <p class="text-4xl font-bold text-green-600" id="resolved-count">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-500 text-sm mb-1">DLQ Ignored</p>
                <p class="text-4xl font-bold text-gray-500" id="ignored-count">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-500 text-sm mb-1">Active Plugins</p>
                <p class="text-4xl font-bold text-blue-600" id="plugins-count">0</p>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-semibold mb-4">Quick Actions</h3>
        <div class="flex gap-4">
            <button onclick="window.location.reload()"
                    class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
                🔄 Refresh
            </button>
            <a href="/dlq" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
                View DLQ →
            </a>
        </div>
    </div>
</div>
{{ end }}
