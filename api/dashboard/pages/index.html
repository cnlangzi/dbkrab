<!--layout:dashboard-->
{{ define "content" }}
<div class="space-y-6">
    <h2 class="text-2xl font-bold text-text">Overview</h2>
    
    <!-- Health Status - loaded via HTMX -->
    <div class="bg-surface rounded-xl shadow-lg p-6 border border-border" hx-get="/api/health" hx-trigger="load">
        <div class="flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-success/20">
                <svg class="w-6 h-6 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <div>
                <h3 class="text-xl font-semibold text-success">System Healthy</h3>
                <p class="text-textMuted">All services are running normally</p>
            </div>
        </div>
    </div>

    <!-- Stats Cards - loaded via HTMX -->
    <div hx-get="/api/dlq/stats" hx-trigger="load" hx-ext="json-enc">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            <div class="bg-surface rounded-xl shadow-lg p-6 border border-border hover:shadow-xl hover:border-primary/30 transition-all duration-200">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-textMuted text-sm font-medium">DLQ Pending</p>
                    <div class="w-8 h-8 rounded-lg bg-error/20 flex items-center justify-center">
                        <svg class="w-4 h-4 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>
                <p class="text-3xl font-bold text-text" id="pending-count">0</p>
            </div>
            
            <div class="bg-surface rounded-xl shadow-lg p-6 border border-border hover:shadow-xl hover:border-success/30 transition-all duration-200">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-textMuted text-sm font-medium">DLQ Resolved</p>
                    <div class="w-8 h-8 rounded-lg bg-success/20 flex items-center justify-center">
                        <svg class="w-4 h-4 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>
                <p class="text-3xl font-bold text-text" id="resolved-count">0</p>
            </div>
            
            <div class="bg-surface rounded-xl shadow-lg p-6 border border-border hover:shadow-xl hover:border-border/50 transition-all duration-200">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-textMuted text-sm font-medium">DLQ Ignored</p>
                    <div class="w-8 h-8 rounded-lg bg-surfaceHover flex items-center justify-center">
                        <svg class="w-4 h-4 text-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                        </svg>
                    </div>
                </div>
                <p class="text-3xl font-bold text-text" id="ignored-count">0</p>
            </div>
            
            <div class="bg-surface rounded-xl shadow-lg p-6 border border-border hover:shadow-xl hover:border-primary/30 transition-all duration-200">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-textMuted text-sm font-medium">Active Plugins</p>
                    <div class="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                </div>
                <p class="text-3xl font-bold text-text" id="plugins-count">0</p>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="bg-surface rounded-xl shadow-lg p-6 border border-border">
        <h3 class="text-lg font-semibold text-text mb-4">Quick Actions</h3>
        <div class="flex flex-wrap gap-3">
            <button onclick="window.location.reload()"
                    class="flex items-center gap-2 px-4 py-2.5 bg-primary hover:bg-primaryHover text-white font-medium rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.058A5.996 5.996 0 0112 5.5c3.314 0 6 2.686 6 6 0 .343-.029.68-.083 1.01M20 20v-5h-.058A5.996 5.996 0 0112 18.5c-3.314 0-6-2.686-6-6 0-.343.029-.68.083-1.01"/>
                </svg>
                Refresh
            </button>
            <a href="/dlq" 
               class="flex items-center gap-2 px-4 py-2.5 bg-success/20 hover:bg-success/30 text-success font-medium rounded-lg border border-success/30 transition-all duration-200">
                View DLQ
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </a>
        </div>
    </div>
</div>
{{ end }}
