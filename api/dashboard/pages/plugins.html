<!--layout:dashboard-->
{{ define "content" }}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold text-gray-800"> Plugins Management</h2>
        <button onclick="window.location.reload()"
                class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
            🔄 Refresh
        </button>
    </div>

    <div hx-get="/api/plugins" hx-trigger="load">
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="2" class="px-6 py-8 text-center text-gray-500">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-semibold mb-4">Plugin Directory</h3>
        <p class="text-gray-600">Place WASM plugin files in the configured plugin directory. They will be auto-loaded and managed here.</p>
    </div>
</div>
{{ end }}
