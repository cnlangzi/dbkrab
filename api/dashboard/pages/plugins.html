<!--layout:dashboard-->
{{ define "content" }}
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
        <h2 class="text-2xl font-bold text-text">Plugins Management</h2>
        <button onclick="window.location.reload()"
                class="flex items-center justify-center gap-2 px-4 py-2 bg-primary hover:bg-primaryHover text-white font-medium rounded-lg transition-all duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.058A5.996 5.996 0 0112 5.5c3.314 0 6 2.686 6 6 0 .343-.029.68-.083 1.01M20 20v-5h-.058A5.996 5.996 0 0112 18.5c-3.314 0-6-2.686-6-6 0-.343.029-.68.083-1.01"/>
            </svg>
            Refresh
        </button>
    </div>

    <!-- Plugins List -->
    <div class="bg-surface rounded-xl shadow-lg border border-border overflow-hidden" hx-get="/api/plugins" hx-trigger="load">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-border">
                <thead class="bg-surfaceHover">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Status</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-border">
                    <tr>
                        <td colspan="2" class="px-6 py-8 text-center text-textMuted">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Plugin Directory Info -->
    <div class="bg-surface rounded-xl shadow-lg p-6 border border-border">
        <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-xl bg-primary/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                </svg>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-text mb-2">Plugin Directory</h3>
                <p class="text-textMuted">Place WASM plugin files in the configured plugin directory. They will be auto-loaded and managed here.</p>
            </div>
        </div>
    </div>
</div>
{{ end }}
