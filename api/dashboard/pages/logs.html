<!--layout:dashboard-->
{{ define "content" }}
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
        <h2 class="text-2xl font-bold text-text">CDC Change Logs</h2>
        <button onclick="loadLogs()" class="flex items-center justify-center gap-2 px-4 py-2 bg-primary hover:bg-primaryHover text-white font-medium rounded-lg transition-all duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.058A5.996 5.996 0 0112 5.5c3.314 0 6 2.686 6 6 0 .343-.029.68-.083 1.01M20 20v-5h-.058A5.996 5.996 0 0112 18.5c-3.314 0-6-2.686-6-6 0-.343.029-.68.083-1.01"/>
            </svg>
            Refresh
        </button>
    </div>

    <!-- Filters -->
    <div class="bg-surface rounded-xl shadow-lg p-6 border border-border">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-textMuted mb-2">Table</label>
                <input type="text" id="filter-table" placeholder="schema.table" 
                       class="w-full px-4 py-2.5 bg-surfaceHover border border-border rounded-lg text-text placeholder-textMuted focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-textMuted mb-2">Operation</label>
                <select id="filter-operation" class="w-full px-4 py-2.5 bg-surfaceHover border border-border rounded-lg text-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    <option value="">All</option>
                    <option value="INSERT">INSERT</option>
                    <option value="UPDATE_AFTER">Update After</option>
                    <option value="DELETE">DELETE</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-textMuted mb-2">Transaction ID</label>
                <input type="text" id="filter-txid" placeholder="Transaction ID" 
                       class="w-full px-4 py-2.5 bg-surfaceHover border border-border rounded-lg text-text placeholder-textMuted focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
            <div class="flex items-end">
                <button onclick="applyFilters()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-success hover:bg-success/80 text-white font-medium rounded-lg transition-all duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    Apply Filters
                </button>
            </div>
        </div>
    </div>

    <!-- Poller Status -->
    <div class="bg-surface rounded-xl shadow-lg p-6 border border-border">
        <h3 class="text-lg font-semibold text-text mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            Poller Status
        </h3>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="p-4 rounded-xl bg-primary/10 border border-primary/20">
                <p class="text-textMuted text-sm mb-1">Last Poll Time</p>
                <p id="last-poll-time" class="text-lg font-bold text-primary">-</p>
            </div>
            <div class="p-4 rounded-xl bg-success/10 border border-success/20">
                <p class="text-textMuted text-sm mb-1">Last LSN</p>
                <p id="last-lsn" class="text-lg font-bold text-success font-mono text-sm">-</p>
            </div>
            <div class="p-4 rounded-xl bg-warning/10 border border-warning/20">
                <p class="text-textMuted text-sm mb-1">Total Changes Captured</p>
                <p id="total-changes" class="text-lg font-bold text-warning">0</p>
            </div>
        </div>
    </div>

    <!-- Logs Stats -->
    <div class="bg-surface rounded-xl shadow-lg p-6 border border-border">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <p class="text-textMuted text-sm">Showing <span id="log-count" class="font-bold text-primary">0</span> logs</p>
            </div>
            <div class="flex gap-2">
                <button onclick="setLimit(50)" class="px-3 py-1.5 text-sm bg-surfaceHover hover:bg-border text-textMuted hover:text-text font-medium rounded-lg transition-all">50</button>
                <button onclick="setLimit(100)" class="px-3 py-1.5 text-sm bg-primary text-white font-medium rounded-lg">100</button>
                <button onclick="setLimit(500)" class="px-3 py-1.5 text-sm bg-surfaceHover hover:bg-border text-textMuted hover:text-text font-medium rounded-lg transition-all">500</button>
            </div>
        </div>
    </div>

    <!-- Logs Table -->
    <div class="bg-surface rounded-xl shadow-lg border border-border overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-border">
                <thead class="bg-surfaceHover">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Table</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Operation</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Transaction ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Time</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Data</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-border" id="logs-container">
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-textMuted">
                            Loading logs...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let currentLimit = 100;

function loadPollerStatus() {
    fetch('/api/cdc/status')
        .then(r => r.json())
        .then(data => {
            if (data.success && data.state) {
                const state = data.state;
                document.getElementById('last-poll-time').textContent = state.last_poll_time || 'Never';
                document.getElementById('last-lsn').textContent = state.last_lsn || '-';
                document.getElementById('total-changes').textContent = state.total_changes || 0;
            }
        })
        .catch(err => {
            console.error('Failed to load poller status:', err);
        });
}

function setLimit(limit) {
    currentLimit = limit;
    document.querySelectorAll('button[onclick^="setLimit"]').forEach(btn => {
        btn.classList.remove('bg-primary', 'text-white');
        btn.classList.add('bg-surfaceHover', 'text-textMuted');
    });
    event.target.classList.remove('bg-surfaceHover', 'text-textMuted');
    event.target.classList.add('bg-primary', 'text-white');
    loadLogs();
}

function applyFilters() {
    loadLogs();
}

function loadLogs() {
    const table = document.getElementById('filter-table').value;
    const operation = document.getElementById('filter-operation').value;
    const txid = document.getElementById('filter-txid').value;
    
    const params = new URLSearchParams({
        limit: currentLimit.toString()
    });
    if (table) params.append('table', table);
    if (operation) params.append('operation', operation);
    if (txid) params.append('transaction_id', txid);

    fetch('/api/cdc/logs?' + params.toString())
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('logs-container');
            const countEl = document.getElementById('log-count');
            
            countEl.textContent = data.count || 0;
            
            if (!data.logs || data.logs.length === 0) {
                container.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-textMuted">No logs found</td></tr>';
                return;
            }
            
            container.innerHTML = data.logs.map(log => {
                const opStyle = {
                    'INSERT': 'bg-success/20 text-success border-success/30',
                    'UPDATE_AFTER': 'bg-warning/20 text-warning border-warning/30',
                    'DELETE': 'bg-error/20 text-error border-error/30'
                }[log.operation] || 'bg-surfaceHover text-textMuted border-border';
                
                const dataPreview = JSON.stringify(log.data).substring(0, 200);
                const dataFull = JSON.stringify(log.data, null, 2);
                
                return `
                    <tr class="hover:bg-surfaceHover transition-colors">
                        <td class="px-6 py-4 text-sm text-textMuted font-mono">${log.id}</td>
                        <td class="px-6 py-4 text-sm text-text font-medium">${log.table_name}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-1 text-xs font-semibold rounded-full border ${opStyle}">
                                ${log.operation}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-textMuted font-mono">${log.transaction_id}</td>
                        <td class="px-6 py-4 text-sm text-textMuted">${log.created_at || '-'}</td>
                        <td class="px-6 py-4 text-sm">
                            <details class="group">
                                <summary class="cursor-pointer text-primary hover:text-primaryHover transition-colors truncate max-w-xs">
                                    ${dataPreview}${dataFull.length > 200 ? '...' : ''}
                                </summary>
                                <pre class="mt-2 p-3 bg-surfaceHover rounded-lg text-xs overflow-auto max-w-md text-text border border-border"><code>${dataFull}</code></pre>
                            </details>
                        </td>
                    </tr>
                `;
            }).join('');
        })
        .catch(err => {
            console.error('Failed to load logs:', err);
            document.getElementById('logs-container').innerHTML = 
                '<tr><td colspan="6" class="px-6 py-8 text-center text-error">Failed to load logs</td></tr>';
        });
}

loadLogs();
loadPollerStatus();
setInterval(loadPollerStatus, 5000);
</script>
{{ end }}
