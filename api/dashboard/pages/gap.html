<!--layout:dashboard-->
{{define "content"}}
<div class="max-w-7xl mx-auto">
    <!-- Page Header -->
    <div class="mb-6">
        <h2 class="text-2xl sm:text-3xl font-bold text-text mb-2">GAP Monitor</h2>
        <p class="text-sm text-textMuted">Monitor CDC data gaps and replication lag for all tracked tables</p>
    </div>
    
    <!-- Overview Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-6">
        <div class="bg-surface rounded-xl shadow-lg p-4 sm:p-6 border border-border">
            <div class="flex items-center justify-between mb-2">
                <p class="text-textMuted text-sm font-medium">Max LSN</p>
                <div class="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center">
                    <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
            </div>
            <p class="text-lg sm:text-xl font-mono font-bold text-text" id="max-lsn">Loading...</p>
        </div>
        
        <div class="bg-surface rounded-xl shadow-lg p-4 sm:p-6 border border-border">
            <div class="flex items-center justify-between mb-2">
                <p class="text-textMuted text-sm font-medium">Tables Monitored</p>
                <div class="w-8 h-8 rounded-lg bg-success/20 flex items-center justify-center">
                    <svg class="w-4 h-4 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
            </div>
            <p class="text-3xl font-bold text-text" id="table-count">0</p>
        </div>
        
        <div class="bg-surface rounded-xl shadow-lg p-4 sm:p-6 border border-border">
            <div class="flex items-center justify-between mb-2">
                <p class="text-textMuted text-sm font-medium">Healthy Tables</p>
                <div class="w-8 h-8 rounded-lg bg-success/20 flex items-center justify-center">
                    <svg class="w-4 h-4 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
            </div>
            <p class="text-3xl font-bold text-success" id="healthy-count">0</p>
        </div>
        
        <div class="bg-surface rounded-xl shadow-lg p-4 sm:p-6 border border-border">
            <div class="flex items-center justify-between mb-2">
                <p class="text-textMuted text-sm font-medium">Issues</p>
                <div class="w-8 h-8 rounded-lg bg-error/20 flex items-center justify-center">
                    <svg class="w-4 h-4 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>
            </div>
            <p class="text-3xl font-bold text-error" id="issue-count">0</p>
        </div>
    </div>

    <!-- Threshold Info -->
    <div class="bg-surface rounded-xl shadow-lg p-4 sm:p-6 mb-6 border border-border">
        <h3 class="text-base sm:text-xl font-semibold text-text mb-4">Alert Thresholds</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-warning/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-warning" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>
                <div>
                    <span class="text-textMuted text-xs sm:text-sm">Warning:</span>
                    <span class="ml-2 font-medium text-warning" id="warn-threshold">Loading...</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-error/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <span class="text-textMuted text-xs sm:text-sm">Critical:</span>
                    <span class="ml-2 font-medium text-error" id="crit-threshold">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Tables List -->
    <div class="bg-surface rounded-xl shadow-lg border border-border overflow-hidden">
        <!-- Header -->
        <div class="p-4 sm:p-6 border-b border-border">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
                <h3 class="text-base sm:text-xl font-semibold text-text">Table Status</h3>
                <!-- 改用 onclick -->
                <button onclick="loadGapData()" class="flex items-center justify-center gap-2 px-3 sm:px-4 py-2 sm:py-2.5 bg-surfaceHover hover:bg-border text-text font-medium rounded-lg transition-all duration-200 min-h-[44px]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.058A5.996 5.996 0 0112 5.5c3.314 0 6 2.686 6 6 0 .343-.029.68-.083 1.01M20 20v5h-.058A5.996 5.996 0 0112 18.5c-3.314 0-6-2.686-6-6 0-.343.029-.68.083-1.01"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- Tables Container -->
        <div id="tables-container" class="p-0">
            <!-- Skeleton Loader -->
            <div class="p-4 sm:p-6 space-y-3">
                <div class="animate-pulse space-y-2">
                    <div class="h-16 sm:h-20 bg-surfaceHover rounded-lg"></div>
                    <div class="h-16 sm:h-20 bg-surfaceHover rounded-lg"></div>
                    <div class="h-16 sm:h-20 bg-surfaceHover rounded-lg"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Message -->
    <div id="status-message" class="hidden mt-6 p-4 rounded-xl border" role="alert" aria-live="polite"></div>
</div>

<script>
let tableData = [];

// Load data on page load
document.addEventListener('DOMContentLoaded', loadGapData);

// Event listeners
// refresh-btn 改用 onclick 绑定，移除 addEventListener

async function loadGapData() {
    try {
        const response = await fetch('/api/cdc/gap');
        const data = await response.json();
        
        if (data.success) {
            tableData = data.tables;
            renderOverview(data);
            renderTables(data.tables);
        } else {
            showError('Failed to load GAP data: ' + data.error);
        }
    } catch (err) {
        showError('Error loading GAP data: ' + err.message);
    }
}

function renderOverview(data) {
    // Max LSN
    document.getElementById('max-lsn').textContent = data.max_lsn || 'N/A';
    
    // Table count
    document.getElementById('table-count').textContent = data.count;
    
    // Count by status
    let healthyCount = 0;
    let issueCount = 0;
    
    data.tables.forEach(table => {
        if (table.status === 'healthy') {
            healthyCount++;
        } else {
            issueCount++;
        }
    });
    
    document.getElementById('healthy-count').textContent = healthyCount;
    document.getElementById('issue-count').textContent = issueCount;
    
    // Thresholds
    if (data.thresholds) {
        const warnBytes = formatBytes(data.thresholds.warning_lag_bytes);
        const warnDuration = data.thresholds.warning_lag_duration;
        document.getElementById('warn-threshold').textContent = `${warnBytes} or ${warnDuration}`;
        
        const critBytes = formatBytes(data.thresholds.critical_lag_bytes);
        const critDuration = data.thresholds.critical_lag_duration;
        document.getElementById('crit-threshold').textContent = `${critBytes} or ${critDuration}`;
    }
}

function renderTables(tables) {
    const container = document.getElementById('tables-container');
    container.innerHTML = '';

    if (tables.length === 0) {
        container.innerHTML = `
            <div class="p-8 text-center">
                <svg class="mx-auto h-12 w-12 text-textMuted mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                </svg>
                <p class="text-textMuted">No tables found</p>
                <p class="text-textMuted text-sm mt-1">Configure tables in config.yaml to start monitoring</p>
            </div>
        `;
        return;
    }

    // Sort by status (critical first, then warning, then healthy)
    const statusOrder = { 'critical': 0, 'warning': 1, 'healthy': 2 };
    const sortedTables = [...tables].sort((a, b) => {
        if (statusOrder[a.status] !== statusOrder[b.status]) {
            return statusOrder[a.status] - statusOrder[b.status];
        }
        return a.table.localeCompare(b.table);
    });

    // Mobile Card View (default) + Desktop Table View
    const wrapper = document.createElement('div');
    
    // Desktop Table (hidden on mobile)
    const tableWrapper = document.createElement('div');
    tableWrapper.className = 'hidden sm:block overflow-x-auto';
    
    const table = document.createElement('table');
    table.className = 'min-w-full divide-y divide-border';
    table.innerHTML = `
        <thead class="bg-surfaceHover">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Table</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Status</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Current LSN</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Max LSN</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Lag</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Duration</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Checked At</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-border">
            ${sortedTables.map(t => renderDesktopRow(t)).join('')}
        </tbody>
    `;
    
    tableWrapper.appendChild(table);
    wrapper.appendChild(tableWrapper);

    // Mobile Cards (visible on mobile, hidden on desktop)
    const mobileContainer = document.createElement('div');
    mobileContainer.className = 'sm:hidden divide-y divide-border';
    mobileContainer.innerHTML = sortedTables.map(t => renderMobileCard(t)).join('');
    wrapper.appendChild(mobileContainer);
    
    container.appendChild(wrapper);
}

function renderDesktopRow(t) {
    const statusBadge = getStatusBadge(t.status);
    const lagDisplay = t.has_gap 
        ? `<span class="text-error font-semibold">DATA LOSS</span>`
        : formatBytes(t.lag_bytes);
    
    return `
        <tr class="${t.status === 'healthy' ? '' : 'bg-' + t.status_color + '/5'} hover:bg-surfaceHover transition-colors">
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm font-medium text-text">${t.name}</div>
                <div class="text-xs text-textMuted">${t.schema}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                ${statusBadge}
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <code class="text-xs font-mono text-textMuted">${t.current_lsn}</code>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <code class="text-xs font-mono text-textMuted">${t.max_lsn}</code>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm text-text">${lagDisplay}</div>
                ${t.has_gap ? '<div class="text-xs text-error">Gap detected</div>' : ''}
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm text-text">${formatDuration(t.lag_duration_secs)}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm text-textMuted">${formatLocalTime(t.checked_at)}</div>
            </td>
        </tr>
    `;
}

function renderMobileCard(t) {
    const statusBadge = getStatusBadge(t.status);
    const lagDisplay = t.has_gap 
        ? `<span class="text-error font-semibold">DATA LOSS</span>`
        : formatBytes(t.lag_bytes);
    
    return `
        <div class="p-4 hover:bg-surfaceHover transition-colors ${t.status === 'healthy' ? '' : 'bg-' + t.status_color + '/5'}">
            <div class="flex items-start justify-between gap-3 mb-3">
                <div class="flex-1 min-w-0">
                    <div class="font-medium text-text truncate">${t.name}</div>
                    <div class="text-xs text-textMuted">${t.schema}</div>
                </div>
                ${statusBadge}
            </div>
            <div class="grid grid-cols-2 gap-3 text-sm">
                <div>
                    <span class="text-textMuted text-xs">Current LSN:</span>
                    <div class="font-mono text-xs text-text truncate">${t.current_lsn}</div>
                </div>
                <div>
                    <span class="text-textMuted text-xs">Max LSN:</span>
                    <div class="font-mono text-xs text-text truncate">${t.max_lsn}</div>
                </div>
                <div>
                    <span class="text-textMuted text-xs">Lag:</span>
                    <div class="text-text">${lagDisplay}</div>
                </div>
                <div>
                    <span class="text-textMuted text-xs">Duration:</span>
                    <div class="text-text">${formatDuration(t.lag_duration_secs)}</div>
                </div>
                <div class="col-span-2">
                    <span class="text-textMuted text-xs">Checked At:</span>
                    <div class="text-text text-xs">${formatLocalTime(t.checked_at)}</div>
                </div>
            </div>
        </div>
    `;
}

function getStatusBadge(status) {
    const configs = {
        'healthy': { color: 'success', label: 'Healthy', icon: '✓' },
        'warning': { color: 'warning', label: 'Warning', icon: '⚠' },
        'critical': { color: 'error', label: 'Critical', icon: '✕' }
    };
    
    const config = configs[status] || configs['healthy'];
    const colorClass = config.color;
    
    return `
        <span class="inline-flex items-center gap-1.5 px-3 py-1 text-xs font-semibold rounded-full bg-${colorClass}/20 text-${colorClass} border border-${colorClass}/30">
            <span class="w-1.5 h-1.5 rounded-full bg-${colorClass}"></span>
            ${config.label}
        </span>
    `;
}

function formatBytes(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    if (bytes < 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    if (isNaN(i) || i < 0 || i >= sizes.length) return bytes + ' B';
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function formatDuration(secs) {
    if (secs < 60) return `${secs}s`;
    if (secs < 3600) return `${Math.floor(secs / 60)}m ${secs % 60}s`;
    const hours = Math.floor(secs / 3600);
    const mins = Math.floor((secs % 3600) / 60);
    return `${hours}h ${mins}m`;
}

function showSuccess(message) {
    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'mt-6 p-4 rounded-xl border bg-success/10 border-success/30 text-success';
    statusDiv.innerHTML = message;
    statusDiv.classList.remove('hidden');
    setTimeout(() => statusDiv.classList.add('hidden'), 5000);
}

function showError(message) {
    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'mt-6 p-4 rounded-xl border bg-error/10 border-error/30 text-error flex items-start gap-3';
    statusDiv.innerHTML = `
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>${message}</span>
    `;
    statusDiv.classList.remove('hidden');
    setTimeout(() => statusDiv.classList.add('hidden'), 5000);
}
</script>
{{end}}
