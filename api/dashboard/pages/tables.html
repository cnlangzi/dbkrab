{{define "content"}}
<div class="max-w-7xl mx-auto">
    <h2 class="text-3xl font-bold text-gray-800 mb-6">📋 Table CDC Configuration</h2>
    
    <!-- Database Info -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h3 class="text-xl font-semibold text-gray-700 mb-4">Current Database</h3>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <span class="text-gray-500">Database:</span>
                <span class="ml-2 font-medium" id="db-name">Loading...</span>
            </div>
            <div>
                <span class="text-gray-500">Tables:</span>
                <span class="ml-2 font-medium" id="table-count">0</span>
            </div>
        </div>
    </div>

    <!-- Tables List -->
    <div class="bg-white rounded-lg shadow">
        <div class="p-6 border-b border-gray-200">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-semibold text-gray-700">Available Tables</h3>
                <button id="refresh-btn" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded text-gray-700">
                    🔄 Refresh
                </button>
            </div>
        </div>
        
        <div class="p-6">
            <div class="mb-4 flex gap-4">
                <button id="select-all-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded">
                    Select All
                </button>
                <button id="deselect-all-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded">
                    Deselect All
                </button>
                <button id="save-btn" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded">
                    💾 Save Configuration
                </button>
            </div>

            <div id="tables-container" class="space-y-2">
                <div class="text-center text-gray-500 py-8">Loading tables...</div>
            </div>
        </div>
    </div>

    <!-- Status Message -->
    <div id="status-message" class="hidden mt-6 p-4 rounded-lg"></div>
</div>

<script>
let allTables = [];
let selectedTables = new Set();

// Load tables on page load
document.addEventListener('DOMContentLoaded', loadTables);

// Event listeners
document.getElementById('refresh-btn').addEventListener('click', loadTables);
document.getElementById('select-all-btn').addEventListener('click', selectAll);
document.getElementById('deselect-all-btn').addEventListener('click', deselectAll);
document.getElementById('save-btn').addEventListener('click', saveConfiguration);

async function loadTables() {
    try {
        const response = await fetch('/api/cdc/tables');
        const data = await response.json();
        
        if (data.success) {
            allTables = data.tables;
            renderTables(data.tables);
            document.getElementById('table-count').textContent = data.tables.length;
            document.getElementById('db-name').textContent = 'F9All'; // Could be fetched from API
        } else {
            showError('Failed to load tables: ' + data.error);
        }
    } catch (err) {
        showError('Error loading tables: ' + err.message);
    }
}

function renderTables(tables) {
    const container = document.getElementById('tables-container');
    container.innerHTML = '';

    if (tables.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-500 py-8">No tables found</div>';
        return;
    }

    const table = document.createElement('table');
    table.className = 'min-w-full divide-y divide-gray-200';
    table.innerHTML = `
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                    <input type="checkbox" id="select-all-checkbox" class="rounded">
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Schema</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Table Name</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CDC Status</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            ${tables.map(t => `
                <tr class="${t.cdc_enabled ? 'bg-green-50' : ''}">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <input type="checkbox" 
                               class="table-checkbox rounded" 
                               data-schema="${t.schema}" 
                               data-name="${t.name}"
                               ${t.cdc_enabled ? 'checked' : ''}>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${t.schema}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${t.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${t.cdc_enabled 
                            ? '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">✅ Enabled</span>'
                            : '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-gray-100 text-gray-800">❌ Disabled</span>'}
                    </td>
                </tr>
            `).join('')}
        </tbody>
    `;
    
    container.appendChild(table);

    // Add checkbox event listeners
    document.getElementById('select-all-checkbox').addEventListener('change', (e) => {
        document.querySelectorAll('.table-checkbox').forEach(cb => {
            cb.checked = e.target.checked;
        });
        updateSelectedTables();
    });

    document.querySelectorAll('.table-checkbox').forEach(cb => {
        cb.addEventListener('change', updateSelectedTables);
    });
}

function selectAll() {
    document.querySelectorAll('.table-checkbox').forEach(cb => {
        cb.checked = true;
    });
    updateSelectedTables();
}

function deselectAll() {
    document.querySelectorAll('.table-checkbox').forEach(cb => {
        cb.checked = false;
    });
    updateSelectedTables();
}

function updateSelectedTables() {
    selectedTables.clear();
    document.querySelectorAll('.table-checkbox:checked').forEach(cb => {
        const fullName = `${cb.dataset.schema}.${cb.dataset.name}`;
        selectedTables.add(fullName);
    });
}

async function saveConfiguration() {
    const tables = Array.from(selectedTables);
    
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Saving...';

    try {
        const response = await fetch('/api/cdc/config', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ tables }),
        });

        const data = await response.json();
        
        if (data.success) {
            showSuccess(`
                <strong>Configuration saved!</strong><br>
                Tables enabled: ${data.enabled.length}<br>
                Already enabled: ${data.skipped.length}
            `);
            // Reload tables to show updated status
            setTimeout(loadTables, 1000);
        } else {
            showError('Failed to save configuration: ' + data.error);
        }
    } catch (err) {
        showError('Error saving configuration: ' + err.message);
    } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Save Configuration';
    }
}

function showSuccess(message) {
    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'mt-6 p-4 rounded-lg bg-green-100 border border-green-400 text-green-700';
    statusDiv.innerHTML = message;
    statusDiv.classList.remove('hidden');
    setTimeout(() => statusDiv.classList.add('hidden'), 5000);
}

function showError(message) {
    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'mt-6 p-4 rounded-lg bg-red-100 border border-red-400 text-red-700';
    statusDiv.textContent = message;
    statusDiv.classList.remove('hidden');
    setTimeout(() => statusDiv.classList.add('hidden'), 5000);
}
</script>
{{end}}
