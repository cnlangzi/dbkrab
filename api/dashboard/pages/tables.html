<!--layout:dashboard-->
{{define "content"}}
<div class="max-w-7xl mx-auto">
    <h2 class="text-3xl font-bold text-text mb-6">CDC Table Configuration</h2>
    
    <!-- Database Info -->
    <div class="bg-surface rounded-xl shadow-lg p-6 mb-6 border border-border">
        <h3 class="text-xl font-semibold text-text mb-4">Current Database</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-primary/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
                    </svg>
                </div>
                <div>
                    <span class="text-textMuted text-sm">Database:</span>
                    <span class="ml-2 font-medium text-text" id="db-name">Loading...</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-success/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <div>
                    <span class="text-textMuted text-sm">Tables:</span>
                    <span class="ml-2 font-medium text-text" id="table-count">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Tables List -->
    <div class="bg-surface rounded-xl shadow-lg border border-border overflow-hidden">
        <div class="p-6 border-b border-border">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                <h3 class="text-xl font-semibold text-text">Available Tables</h3>
                <button id="refresh-btn" class="flex items-center justify-center gap-2 px-4 py-2 bg-surfaceHover hover:bg-border text-text font-medium rounded-lg transition-all duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.058A5.996 5.996 0 0112 5.5c3.314 0 6 2.686 6 6 0 .343-.029.68-.083 1.01M20 20v-5h-.058A5.996 5.996 0 0112 18.5c-3.314 0-6-2.686-6-6 0-.343.029-.68.083-1.01"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
        
        <div class="p-6">
            <div class="mb-4 flex flex-wrap gap-3">
                <button id="select-all-btn" class="flex items-center gap-2 px-4 py-2 bg-primary hover:bg-primaryHover text-white font-medium rounded-lg transition-all duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Select All
                </button>
                <button id="deselect-all-btn" class="flex items-center gap-2 px-4 py-2 bg-surfaceHover hover:bg-border text-text font-medium rounded-lg transition-all duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                    </svg>
                    Deselect All
                </button>
                <button id="save-btn" class="flex items-center gap-2 px-4 py-2 bg-success hover:bg-success/80 text-white font-medium rounded-lg transition-all duration-200 shadow-md">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Save Configuration
                </button>
            </div>

            <div id="tables-container" class="space-y-2">
                <div class="text-center text-textMuted py-8">Loading tables...</div>
            </div>
        </div>
    </div>

    <!-- Status Message -->
    <div id="status-message" class="hidden mt-6 p-4 rounded-xl border"></div>
</div>

<script>
let allTables = [];
let selectedTables = new Set();

// Load tables on page load
document.addEventListener('DOMContentLoaded', loadTables);

// Event listeners
document.getElementById('refresh-btn').addEventListener('click', loadTables);
document.getElementById('select-all-btn').addEventListener('click', selectAll);
document.getElementById('deselect-all-btn').addEventListener('click', deselectAll);
document.getElementById('save-btn').addEventListener('click', saveConfiguration);

async function loadTables() {
    try {
        const response = await fetch('/api/cdc/tables');
        const data = await response.json();
        
        if (data.success) {
            allTables = data.tables;
            renderTables(data.tables);
            document.getElementById('table-count').textContent = data.tables.length;
            document.getElementById('db-name').textContent = 'F9All';
        } else {
            showError('Failed to load tables: ' + data.error);
        }
    } catch (err) {
        showError('Error loading tables: ' + err.message);
    }
}

function renderTables(tables) {
    const container = document.getElementById('tables-container');
    container.innerHTML = '';

    if (tables.length === 0) {
        container.innerHTML = '<div class="text-center text-textMuted py-8">No tables found</div>';
        return;
    }

    const sortedTables = [...tables].sort((a, b) => {
        if (a.cdc_enabled !== b.cdc_enabled) {
            return a.cdc_enabled ? -1 : 1;
        }
        const nameA = `${a.schema}.${a.name}`;
        const nameB = `${b.schema}.${b.name}`;
        return nameA.localeCompare(nameB);
    });

    const wrapper = document.createElement('div');
    wrapper.className = 'overflow-x-auto';
    
    const table = document.createElement('table');
    table.className = 'min-w-full divide-y divide-border';
    table.innerHTML = `
        <thead class="bg-surfaceHover">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">
                    <input type="checkbox" id="select-all-checkbox" class="rounded border-border bg-surface text-primary focus:ring-primary focus:ring-offset-0">
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Schema</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Table Name</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">CDC Status</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-border">
            ${sortedTables.map(t => `
                <tr class="${t.cdc_enabled ? 'bg-success/5' : ''} hover:bg-surfaceHover transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <input type="checkbox" 
                               class="table-checkbox rounded border-border bg-surface text-primary focus:ring-primary focus:ring-offset-0" 
                               data-schema="${t.schema}" 
                               data-name="${t.name}"
                               ${t.tracked ? 'checked' : ''}>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-text">${t.schema}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-text font-medium">${t.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${t.cdc_enabled 
                            ? '<span class="inline-flex items-center gap-1.5 px-3 py-1 text-xs font-semibold rounded-full bg-success/20 text-success border border-success/30"><span class="w-1.5 h-1.5 rounded-full bg-success"></span>Enabled</span>'
                            : '<span class="inline-flex items-center gap-1.5 px-3 py-1 text-xs font-semibold rounded-full bg-surfaceHover text-textMuted border border-border"><span class="w-1.5 h-1.5 rounded-full bg-textMuted"></span>Disabled</span>'}
                    </td>
                </tr>
            `).join('')}
        </tbody>
    `;
    
    wrapper.appendChild(table);
    container.appendChild(wrapper);

    document.getElementById('select-all-checkbox').addEventListener('change', (e) => {
        document.querySelectorAll('.table-checkbox').forEach(cb => {
            cb.checked = e.target.checked;
        });
        updateSelectedTables();
    });

    document.querySelectorAll('.table-checkbox').forEach(cb => {
        cb.addEventListener('change', updateSelectedTables);
    });
}

function selectAll() {
    document.querySelectorAll('.table-checkbox').forEach(cb => {
        cb.checked = true;
    });
    updateSelectedTables();
}

function deselectAll() {
    document.querySelectorAll('.table-checkbox').forEach(cb => {
        cb.checked = false;
    });
    updateSelectedTables();
}

function updateSelectedTables() {
    selectedTables.clear();
    document.querySelectorAll('.table-checkbox:checked').forEach(cb => {
        const fullName = `${cb.dataset.schema}.${cb.dataset.name}`;
        selectedTables.add(fullName);
    });
}

async function saveConfiguration() {
    const tables = Array.from(selectedTables);
    
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = true;
    saveBtn.innerHTML = `
        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Saving...
    `;

    try {
        const response = await fetch('/api/cdc/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tables }),
        });

        const data = await response.json();
        
        if (data.success) {
            showSuccess(`
                <strong class="font-semibold">Configuration saved!</strong><br>
                <span class="text-sm">Tables enabled: ${data.enabled.length} | Already enabled: ${data.skipped.length}</span>
            `);
            setTimeout(loadTables, 1000);
        } else {
            showError('Failed to save configuration: ' + data.error);
        }
    } catch (err) {
        showError('Error saving configuration: ' + err.message);
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = `
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
            </svg>
            Save Configuration
        `;
    }
}

function showSuccess(message) {
    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'mt-6 p-4 rounded-xl border bg-success/10 border-success/30 text-success';
    statusDiv.innerHTML = message;
    statusDiv.classList.remove('hidden');
    setTimeout(() => statusDiv.classList.add('hidden'), 5000);
}

function showError(message) {
    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'mt-6 p-4 rounded-xl border bg-error/10 border-error/30 text-error';
    statusDiv.textContent = message;
    statusDiv.classList.remove('hidden');
    setTimeout(() => statusDiv.classList.add('hidden'), 5000);
}
</script>
{{end}}
