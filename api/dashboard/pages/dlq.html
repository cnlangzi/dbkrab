<!--layout:dashboard-->
{{ define "content" }}
<div class="space-y-6">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold text-gray-800">Dead Letter Queue</h2>
        <button onclick="window.location.reload()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
            🔄 Refresh
        </button>
    </div>

    <div class="bg-white rounded-lg shadow p-6" hx-get="/api/dlq/stats" hx-trigger="load">
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="text-center">
                <p class="text-gray-500 text-sm">Pending</p>
                <p class="text-3xl font-bold text-red-600" id="dlq-pending">-</p>
            </div>
            <div class="text-center">
                <p class="text-gray-500 text-sm">Resolved</p>
                <p class="text-3xl font-bold text-green-600" id="dlq-resolved">-</p>
            </div>
            <div class="text-center">
                <p class="text-gray-500 text-sm">Ignored</p>
                <p class="text-3xl font-bold text-gray-500" id="dlq-ignored">-</p>
            </div>
        </div>
    </div>

    <div hx-get="/api/dlq/list" hx-trigger="load">
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Table</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Error</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{{ end }}
