<!--layout:dashboard-->
{{ define "content" }}
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
        <h2 class="text-2xl font-bold text-text">Dead Letter Queue</h2>
        <button onclick="loadDLQ()" class="flex items-center justify-center gap-2 px-4 py-2 bg-primary hover:bg-primaryHover text-white font-medium rounded-lg transition-all duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.058A5.996 5.996 0 0112 5.5c3.314 0 6 2.686 6 6 0 .343-.029.68-.083 1.01M20 20v-5h-.058A5.996 5.996 0 0112 18.5c-3.314 0-6-2.686-6-6 0-.343-.029.68.083 1.01"/>
            </svg>
            Refresh
        </button>
    </div>

    <!-- Stats Cards -->
    <div class="bg-surface rounded-xl shadow-lg p-6 border border-border">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6">
            <div class="p-6 rounded-xl bg-error/10 border border-error/20 hover:border-error/40 transition-all duration-200">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-textMuted text-sm font-medium">Pending</p>
                    <div class="w-10 h-10 rounded-lg bg-error/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>
                <p class="text-4xl font-bold text-error" id="dlq-pending">-</p>
            </div>
            
            <div class="p-6 rounded-xl bg-success/10 border border-success/20 hover:border-success/40 transition-all duration-200">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-textMuted text-sm font-medium">Resolved</p>
                    <div class="w-10 h-10 rounded-lg bg-success/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>
                <p class="text-4xl font-bold text-success" id="dlq-resolved">-</p>
            </div>
            
            <div class="p-6 rounded-xl bg-surfaceHover border border-border hover:border-border/60 transition-all duration-200">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-textMuted text-sm font-medium">Ignored</p>
                    <div class="w-10 h-10 rounded-lg bg-surfaceHover flex items-center justify-center">
                        <svg class="w-5 h-5 text-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                        </svg>
                    </div>
                </div>
                <p class="text-4xl font-bold text-textMuted" id="dlq-ignored">-</p>
            </div>
        </div>
    </div>

    <!-- DLQ List - Desktop Table -->
    <div class="bg-surface rounded-xl shadow-lg border border-border overflow-hidden hidden sm:block">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-border">
                <thead class="bg-surfaceHover">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Source</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Table</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Error</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Created</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-textMuted uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-border" id="dlq-container-desktop">
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-textMuted">
                            <div class="flex items-center justify-center gap-2">
                                <svg class="animate-spin h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                <span>Loading...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- DLQ List - Mobile Cards -->
    <div class="bg-surface rounded-xl shadow-lg border border-border overflow-hidden sm:hidden">
        <div class="divide-y divide-border" id="dlq-container-mobile">
            <div class="p-6 text-center text-textMuted">
                <div class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Loading...</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function loadDLQ() {
    // Load stats from API
    fetch('/api/dlq/stats')
        .then(r => r.json())
        .then(data => {
            if (data.success && data.stats) {
                document.getElementById('dlq-pending').textContent = data.stats.pending || 0;
                document.getElementById('dlq-resolved').textContent = data.stats.resolved || 0;
                document.getElementById('dlq-ignored').textContent = data.stats.ignored || 0;
            }
        })
        .catch(err => console.error('Failed to load DLQ stats:', err));

    // Load list
    fetch('/api/dlq/list')
        .then(r => r.json())
        .then(data => {
            if (data.success && data.entries) {
                renderDLQDesktop(data.entries);
                renderDLQMobile(data.entries);
            } else {
                document.getElementById('dlq-container-desktop').innerHTML = 
                    '<tr><td colspan="7" class="px-6 py-8 text-center text-textMuted">No entries</td></tr>';
                document.getElementById('dlq-container-mobile').innerHTML = 
                    '<div class="p-6 text-center text-textMuted">No entries</div>';
            }
        })
        .catch(err => {
            console.error('Failed to load DLQ list:', err);
            document.getElementById('dlq-container-desktop').innerHTML = 
                '<tr><td colspan="7" class="px-6 py-8 text-center text-error">Failed to load</td></tr>';
            document.getElementById('dlq-container-mobile').innerHTML = 
                '<div class="p-6 text-center text-error">Failed to load</div>';
        });
}

function renderDLQDesktop(entries) {
    const container = document.getElementById('dlq-container-desktop');
    
    if (!entries || entries.length === 0) {
        container.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-textMuted">No entries</td></tr>';
        return;
    }

    container.innerHTML = entries.map(entry => {
        const statusClass = entry.status === 'pending' ? 'bg-error/20 text-error' :
                           entry.status === 'resolved' ? 'bg-success/20 text-success' :
                           'bg-surfaceHover text-textMuted';
        
        const errorPreview = entry.error_message ? 
            (entry.error_message.length > 50 ? entry.error_message.substring(0, 50) + '...' : entry.error_message) : 
            '-';
        
        const created = entry.created_at ? formatLocalTime(entry.created_at) : '-';
        const id = entry.id || 0;
        const source = entry.source || '-';
        const dataJSON = JSON.stringify(entry, null, 2);
        
        return `
            <tr class="hover:bg-surfaceHover transition-colors">
                <td class="px-6 py-4 text-sm text-text font-mono">${id}</td>
                <td class="px-6 py-4 text-sm text-text">
                    <span class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded bg-surfaceHover text-textMuted">
                        ${escapeHtml(source)}
                    </span>
                </td>
                <td class="px-6 py-4 text-sm text-text">${escapeHtml(entry.table_name || '-')}</td>
                <td class="px-6 py-4 text-xs text-textMuted max-w-xs truncate" title="${escapeHtml(entry.error_message || '')}">${escapeHtml(errorPreview)}</td>
                <td class="px-6 py-4 text-xs text-textMuted whitespace-nowrap">${created}</td>
                <td class="px-6 py-4">
                    <span class="inline-flex items-center px-2.5 py-1 text-xs font-semibold rounded-full ${statusClass}">
                        ${entry.status || 'pending'}
                    </span>
                </td>
                <td class="px-6 py-4 text-xs">
                    <button onclick="toggleDetail(this, '${escapeHtml(dataJSON)}')" class="text-primary hover:text-primaryHover font-medium inline-flex items-center gap-1">
                        <svg class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                        View
                    </button>
                </td>
            </tr>
            <tr class="hidden detail-row bg-surfaceHover">
                <td colspan="7" class="px-6 py-4">
                    <div class="text-xs text-textMuted mb-2 font-medium">Full Entry Data:</div>
                    <pre class="bg-surface rounded-lg p-4 overflow-auto text-xs text-text border border-border"><code>${escapeHtml(dataJSON)}</code></pre>
                </td>
            </tr>
        `;
    }).join('');
}

function renderDLQMobile(entries) {
    const container = document.getElementById('dlq-container-mobile');
    
    if (!entries || entries.length === 0) {
        container.innerHTML = '<div class="p-6 text-center text-textMuted">No entries</div>';
        return;
    }

    container.innerHTML = entries.map(entry => {
        const statusClass = entry.status === 'pending' ? 'bg-error/20 text-error border-error/30' :
                           entry.status === 'resolved' ? 'bg-success/20 text-success border-success/30' :
                           'bg-surfaceHover text-textMuted border-border';
        
        const errorPreview = entry.error_message ? 
            (entry.error_message.length > 50 ? entry.error_message.substring(0, 50) + '...' : entry.error_message) : 
            '-';
        
        const created = entry.created_at ? formatLocalTime(entry.created_at) : '-';
        const id = entry.id || 0;
        const source = entry.source || '-';
        const dataJSON = JSON.stringify(entry, null, 2);
        
        return `
            <div class="p-4 hover:bg-surfaceHover transition-colors">
                <div class="flex items-start justify-between gap-3 mb-3">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="inline-flex items-center px-2 py-0.5 text-xs font-semibold rounded-full border ${statusClass}">
                                ${entry.status || 'pending'}
                            </span>
                            <span class="font-medium text-text truncate">${escapeHtml(entry.table_name || '-')}</span>
                        </div>
                        <div class="flex flex-wrap items-center gap-2 text-xs text-textMuted mb-2">
                            <span class="font-mono">ID: ${id}</span>
                            <span class="text-border">•</span>
                            <span>${escapeHtml(source)}</span>
                        </div>
                        <div class="text-xs text-textMuted mb-2">
                            <span class="text-textMuted">Created:</span> ${created}
                        </div>
                        <div class="text-xs text-textMuted truncate" title="${escapeHtml(entry.error_message || '')}">
                            <span class="text-textMuted">Error:</span> ${escapeHtml(errorPreview)}
                        </div>
                    </div>
                </div>
                <details class="group">
                    <summary class="cursor-pointer text-primary hover:text-primaryHover transition-colors text-sm list-none flex items-center gap-2">
                        <svg class="w-4 h-4 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                        View Details
                    </summary>
                    <div class="mt-2">
                        <pre class="p-3 bg-surface rounded-lg text-xs overflow-auto text-text border border-border"><code>${escapeHtml(dataJSON)}</code></pre>
                    </div>
                </details>
            </div>
        `;
    }).join('');
}

function toggleDetail(btn, dataJSON) {
    const row = btn.closest('tr');
    const detailRow = row.nextElementSibling;
    
    if (detailRow && detailRow.classList.contains('detail-row')) {
        const isHidden = detailRow.classList.contains('hidden');
        detailRow.classList.toggle('hidden');
        btn.innerHTML = isHidden ? 
            `<svg class="w-4 h-4 transition-transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg> Hide` :
            `<svg class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg> View`;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatLocalTime(timeStr) {
    if (!timeStr) return '-';
    try {
        const date = new Date(timeStr);
        return date.toLocaleString();
    } catch {
        return timeStr;
    }
}

// Load on page ready
document.addEventListener('DOMContentLoaded', loadDLQ);
</script>
{{ end }}
