name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: make mod

      - name: Run go vet
        run: make vet

      - name: Run tests
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Build
        run: make build

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m --disable=staticcheck

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Test1234!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd="grep -q 'ready for client connections' /var/opt/mssql/log/errorlog"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
          --health-start-period=60s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup test database and enable CDC
        run: |
          echo "Setting up test database with CDC..."
          # Copy SQL file to container
          docker cp tests/integration/setup.sql $(docker ps -q -f name=mssql):/tmp/setup.sql
          # Run setup script inside container (MSSQL 2019 uses mssql-tools18)
          docker exec $(docker ps -q -f name=mssql) /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Test1234!' \
            -v TEST_USER_PASSWORD='Test1234!' \
            -i /tmp/setup.sql
          echo "CDC setup complete"

      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          cd tests/integration
          go test -v -race -timeout=5m ./...
        env:
          MSSQL_HOST: localhost
          MSSQL_PORT: 1433
          MSSQL_USER: sa
          MSSQL_PASSWORD: Test1234!
          MSSQL_DATABASE: dbkrab_test

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, integration]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "=== Test Results ==="
          echo "Unit Tests: ${{ needs.test.result }}"
          echo "Integration Tests: ${{ needs.integration.result }}"
          
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.integration.result }}" != "success" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          
          echo "✅ All tests passed"