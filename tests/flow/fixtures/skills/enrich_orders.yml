name: enrich_orders
description: "cross-table orders enrichment"

on:
  - orders

database: business

sinks:
  - name: sync
    when: [insert, update]
    sql: |
      SELECT
        @cdc_lsn as cdc_lsn,
        @cdc_tx_id as cdc_transaction_id,
        @cdc_table as cdc_source_table,
        @cdc_operation as cdc_operation,
        o.order_id,
        o.amount,
        o.status,
        o.created_at
      FROM orders o
      WHERE o.order_id IN (@orders_order_id);
    output: enriched_orders
    primary_key: order_id
