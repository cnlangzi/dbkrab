name: sync_orders
description: "orders CDC sync to order_sync"

on:
  - orders

sinks:
  - name: sync
    when: [insert, update]
    sql: |
      SELECT
        @cdc_lsn as cdc_lsn,
        @cdc_tx_id as cdc_transaction_id,
        @cdc_table as cdc_source_table,
        @cdc_operation as cdc_operation,
        o.order_id,
        o.amount,
        o.status,
        o.created_at
      FROM orders o
      WHERE o.order_id IN (@orders_order_id);
    output: order_sync
    primary_key: order_id

  - name: sync_delete
    when: [delete]
    sql: |
      SELECT @cdc_lsn as cdc_lsn, @orders_order_id as order_id
    output: order_sync
    primary_key: order_id
