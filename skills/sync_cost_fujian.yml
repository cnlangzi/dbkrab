name: sync_cost_fujian
description: "福建 Cost/Costitem CDC 同步 - 主从表 fanout"

on:
  - Cost
  - Costitem

jobs:
  - name: log_cost_event
    sql: |
      SELECT 
        @cdc_lsn as cdc_lsn,
        @cdc_tx_id as cdc_tx_id,
        @cdc_table as cdc_table,
        @Cost_Id as cost_id,
        @Costitem_CostId as costitem_costid,
        GETDATE() as logged_at
    output: cost_sync_events

sinks:
  # ==================== Cost 表同步 ====================
  insert:
    - name: cost_sync
      on: Cost
      sql: |
        SELECT 
          @cdc_lsn as cdc_lsn,
          @cdc_tx_id as cdc_transaction_id,
          @cdc_table as cdc_source_table,
          @cdc_operation as cdc_operation,
          @Cost_Id as Id,
          Cost.OrgCd,
          Cost.CtrlOffice,
          Cost.Depart,
          Cost.Saler,
          Cost.SalerAss,
          Cost.Ctrlop,
          Cost.CtrlDoc,
          Cost.OpOffice,
          Cost.OpDepart,
          Cost.Service,
          Cost.Op,
          Cost.Doc,
          Cost.DocAss,
          Cost.BusName,
          Cost.BookName,
          Cost.Os,
          Cost.OsAss,
          Cost.OpAss,
          Cost.CtnrOp,
          Cost.AccOffice,
          Cost.AccDepart,
          Cost.Accounter,
          Cost.ItemCompName,
          Cost.BizName,
          Cost.Ieid,
          Cost.Buskind,
          Cost.Busway,
          Cost.BusType,
          Cost.DealPrice,
          Cost.Traffic,
          Cost.LclId,
          Cost.Resource,
          Cost.BlnoId,
          Cost.BizNo,
          Cost.HBlno,
          Cost.OBlno,
          Cost.MBlno,
          Cost.Jobnoin,
          Cost.ConNoList,
          Cost.BizDate,
          Cost.Etsh,
          Cost.Etad,
          Cost.Atd,
          Cost.Ata,
          Cost.OpDate,
          Cost.CompleteDt,
          Cost.Carri,
          Cost.CarNo,
          Cost.Portlcd,
          Cost.Portl,
          Cost.PortdCd,
          Cost.Portd,
          Cost.DestCd,
          Cost.Dest,
          Cost.Line,
          Cost.TradeArea,
          Cost.Entrust,
          EntName = cus.CusFullNameChs,
          EntLocalName = loccode.CodeName,
          Cost.CusPayWay,
          Cost.Manager,
          Cost.Carrier,
          Cost.LrManager,
          Cost.LrCarrier,
          Cost.Ro,
          Cost.Agent,
          Cost.Owner,
          Cost.ConOwner,
          Cost.ShipAgent,
          Cost.Trailer,
          Cost.Customs,
          Cost.Shipper,
          Cost.Consignee,
          Cost.HShipper,
          Cost.HConsignee,
          Cost.SumCtns,
          Cost.SumWeight,
          Cost.SumMeas,
          Cost.ChgWeightTtl,
          Cost.CusChgWeight,
          Cost.ConCnt,
          Cost.ConNum,
          Cost.Teu,
          Cost.TruckNo,
          Cost.SealNo,
          Cost.ConSize,
          Cost.ConType,
          Cost.CargoName,
          Cost.Cancelid,
          Cost.Cancel,
          Cost.BusLock,
          Cost.BusLockDate,
          Cost.ActLock,
          Cost.ActLockDate,
          Cost.InCompleteUser,
          Cost.InCompleteDate,
          Cost.OutCompleteUser,
          Cost.OutCompleteDate,
          T20 = SUM(CASE WHEN lskcnts.SizeType LIKE '20%' THEN lskcnts.Quantity ELSE 0 END),
          T40 = SUM(CASE WHEN lskcnts.SizeType LIKE '40%' AND lskcnts.SizeType <> '40HQ' THEN lskcnts.Quantity ELSE 0 END),
          T40H = SUM(CASE WHEN lskcnts.SizeType = '40HQ' THEN lskcnts.Quantity ELSE 0 END),
          T45 = SUM(CASE WHEN lskcnts.SizeType LIKE '45%' THEN lskcnts.Quantity ELSE 0 END)
        FROM Cost(nolock)
        LEFT JOIN Customer cus(nolock) ON Cost.EntrustCd = cus.CusCd
        LEFT JOIN Codelib loccode(nolock) ON cus.LocalId = loccode.CodeCd AND loccode.ClassCode = 'LOCALID'
        OUTER APPLY (
          SELECT ExId, SizeType, Quantity = SUM(ISNULL(Quantity, 0))
          FROM ExCnts(nolock)
          WHERE ExCnts.ExId = Cost.Id
            AND ExCnts.LclId = 'FCL'
          GROUP BY ExId, SizeType
        ) AS lskcnts
        WHERE Cost.Id = @Cost_Id
        GROUP BY 
          Cost.Id, Cost.OrgCd, Cost.CtrlOffice, Cost.Depart, Cost.Saler,
          Cost.SalerAss, Cost.Ctrlop, Cost.CtrlDoc, Cost.OpOffice, Cost.OpDepart,
          Cost.Service, Cost.Op, Cost.Doc, Cost.DocAss, Cost.BusName,
          Cost.BookName, Cost.Os, Cost.OsAss, Cost.OpAss, Cost.CtnrOp,
          Cost.AccOffice, Cost.AccDepart, Cost.Accounter, Cost.ItemCompName, Cost.BizName,
          Cost.Ieid, Cost.Buskind, Cost.Busway, Cost.BusType, Cost.DealPrice,
          Cost.Traffic, Cost.LclId, Cost.Resource, Cost.BlnoId, Cost.BizNo,
          Cost.HBlno, Cost.OBlno, Cost.MBlno, Cost.Jobnoin, Cost.ConNoList,
          Cost.BizDate, Cost.Etsh, Cost.Etad, Cost.Atd, Cost.Ata,
          Cost.OpDate, Cost.CompleteDt, Cost.Carri, Cost.CarNo, Cost.Portlcd,
          Cost.Portl, Cost.PortdCd, Cost.Portd, Cost.DestCd, Cost.Dest,
          Cost.Line, Cost.TradeArea, Cost.Entrust, cus.CusFullNameChs, loccode.CodeName,
          Cost.CusPayWay, Cost.Manager, Cost.Carrier, Cost.LrManager, Cost.LrCarrier,
          Cost.Ro, Cost.Agent, Cost.Owner, Cost.ConOwner, Cost.ShipAgent,
          Cost.Trailer, Cost.Customs, Cost.Shipper, Cost.Consignee, Cost.HShipper,
          Cost.HConsignee, Cost.SumCtns, Cost.SumWeight, Cost.SumMeas, Cost.ChgWeightTtl,
          Cost.CusChgWeight, Cost.ConCnt, Cost.ConNum, Cost.Teu, Cost.TruckNo,
          Cost.SealNo, Cost.ConSize, Cost.ConType, Cost.CargoName, Cost.Cancelid,
          Cost.Cancel, Cost.BusLock, Cost.BusLockDate, Cost.ActLock, Cost.ActLockDate,
          Cost.InCompleteUser, Cost.InCompleteDate, Cost.OutCompleteUser, Cost.OutCompleteDate
      output: cost_sync
      primary_key: Id

    # ==================== Costitem 表同步 ====================
    - name: costitem_sync
      on: Costitem
      sql: |
        SELECT 
          @cdc_lsn as cdc_lsn,
          @cdc_tx_id as cdc_transaction_id,
          @cdc_table as cdc_source_table,
          @cdc_operation as cdc_operation,
          Costitem.Id,
          Costitem.CostId,
          Costitem.CostName,
          Costitem.Ioid,
          Costitem.Amount,
          Costitem.Currcd,
          Costitem.ChgRate,
          Costitem.ChgSign,
          Costitem.WhoName,
          Costitem.RecordDate,
          Costitem.Ysje,
          Costitem.InId,
          Costitem.CompName,
          Costitem.Depart,
          Costitem.OrgCd,
          Costitem.DualId,
          Costitem.IcId,
          Costitem.CostAdNo,
          Dun.DunNo,
          Charge.ChgNo,
          Invo.InvoNo,
          Invo.IssueDate,
          Costitem.Ywh,
          Pzhk.Pzh,
          CNYAmount = CASE 
            WHEN Costitem.Currcd IN ('CNY', 'RMB') THEN Costitem.Amount 
            ELSE dbo.CALCAMOUNT(Costitem.Amount, ISNULL(CNYRate.ChgSign, '*'), ISNULL(CNYRate.Chgrate, 1), 'CNY') 
          END,
          USDAmount = CASE 
            WHEN Costitem.Currcd = 'USD' THEN Costitem.Amount 
            ELSE dbo.CALCAMOUNT(Costitem.Amount, ISNULL(USDRate.ChgSign, '*'), ISNULL(USDRate.Chgrate, 1), 'USD') 
          END,
          HKDAmount = CASE 
            WHEN Costitem.Currcd = 'HKD' THEN Costitem.Amount 
            ELSE dbo.CALCAMOUNT(Costitem.Amount, ISNULL(HKDRate.ChgSign, '*'), ISNULL(HKDRate.Chgrate, 1), 'HKD') 
          END,
          VNDAmount = CASE 
            WHEN Costitem.Currcd = 'VND' THEN Costitem.Amount 
            ELSE dbo.CALCAMOUNT(Costitem.Amount, ISNULL(VNDRate.ChgSign, '*'), ISNULL(VNDRate.Chgrate, 1), 'VND') 
          END,
          THBAmount = CASE 
            WHEN Costitem.Currcd = 'THB' THEN Costitem.Amount 
            ELSE dbo.CALCAMOUNT(Costitem.Amount, ISNULL(THBRate.ChgSign, '*'), ISNULL(THBRate.Chgrate, 1), 'THB') 
          END
        FROM Costitem(nolock)
        LEFT JOIN Dun(nolock) ON Costitem.DunId = Dun.Id AND ISNULL(StageId, '') <> 'Z'
        LEFT JOIN Charge(nolock) ON Costitem.ChgId = Charge.Id
        LEFT JOIN Invo(nolock) ON Costitem.InvoId = Invo.Id
        LEFT JOIN Pzhk(nolock) ON Costitem.Ywh = Pzhk.Ywh AND ISNULL(Pzhk.Flag, '') = ''
        LEFT JOIN Cost(nolock) ON Costitem.CostId = Cost.Id
        LEFT JOIN ExRate CNYRate(nolock) 
          ON CNYRate.Currcd = Costitem.Currcd 
          AND CNYRate.DestCurrcd = 'CNY' 
          AND CONVERT(VARCHAR(10), CNYRate.EffDate, 120) <= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
          AND CONVERT(VARCHAR(10), CNYRate.ExpDate, 120) >= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
        LEFT JOIN ExRate USDRate(nolock) 
          ON USDRate.Currcd = Costitem.Currcd 
          AND USDRate.DestCurrcd = 'USD' 
          AND CONVERT(VARCHAR(10), USDRate.EffDate, 120) <= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
          AND CONVERT(VARCHAR(10), USDRate.ExpDate, 120) >= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
        LEFT JOIN ExRate HKDRate(nolock) 
          ON HKDRate.Currcd = Costitem.Currcd 
          AND HKDRate.DestCurrcd = 'HKD' 
          AND CONVERT(VARCHAR(10), HKDRate.EffDate, 120) <= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
          AND CONVERT(VARCHAR(10), HKDRate.ExpDate, 120) >= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
        LEFT JOIN ExRate VNDRate(nolock) 
          ON VNDRate.Currcd = Costitem.Currcd 
          AND VNDRate.DestCurrcd = 'VND' 
          AND CONVERT(VARCHAR(10), VNDRate.EffDate, 120) <= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
          AND CONVERT(VARCHAR(10), VNDRate.ExpDate, 120) >= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
        LEFT JOIN ExRate THBRate(nolock) 
          ON THBRate.Currcd = Costitem.Currcd 
          AND THBRate.DestCurrcd = 'THB' 
          AND CONVERT(VARCHAR(10), THBRate.EffDate, 120) <= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
          AND CONVERT(VARCHAR(10), THBRate.ExpDate, 120) >= CONVERT(VARCHAR(10), ISNULL(Cost.BizDate, GETDATE()), 120)
        WHERE Costitem.Id = @Costitem_Id
      output: costitem_sync
      primary_key: Id

