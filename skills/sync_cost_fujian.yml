    - name: costitem_sync
      on: Costitem
      sql: |
        SELECT 
          @cdc_lsn as cdc_lsn,
          @cdc_tx_id as cdc_transaction_id,
          @cdc_table as cdc_source_table,
          @cdc_operation as cdc_operation,
          Costitem.Id,
          Costitem.CostId,
          Costitem.CostName,
          Costitem.Ioid,
          Costitem.Amount,
          Costitem.Currcd,
          Costitem.ChgRate,
          Costitem.ChgSign,
          Costitem.WhoName,
          Costitem.RecordDate,
          Costitem.Ysje,
          Costitem.InId,
          Costitem.CompName,
          Costitem.Depart,
          Costitem.OrgCd,
          Costitem.DualId,
          Costitem.IcId,
          Costitem.CostAdNo,
          Dun.DunNo,
          Charge.ChgNo,
          Invo.InvoNo,
          Invo.IssueDate,
          Costitem.Ywh,
