            WHEN Costitem.Currcd IN ('CNY', 'RMB') THEN Costitem.Amount 
            ELSE dbo.CALCAMOUNT(Costitem.Amount, ISNULL(CNYRate.ChgSign, '*'), ISNULL(CNYRate.Chgrate, 1), 'CNY') 
