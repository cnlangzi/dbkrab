        LEFT JOIN Dun(nolock) ON Costitem.DunId = Dun.Id AND ISNULL(StageId, '') <> 'Z'
        LEFT JOIN Charge(nolock) ON Costitem.ChgId = Charge.Id
        LEFT JOIN Invo(nolock) ON Costitem.InvoId = Invo.Id
        LEFT JOIN Pzhk(nolock) ON Costitem.Ywh = Pzhk.Ywh AND ISNULL(Pzhk.Flag, '') = ''
